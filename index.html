  function CarDetail({car, state, onBack, onConfirm, cur, setCur}) {
    const d = days(state.pickupDate, state.returnDate);
    const sur = calcSurchargesEur(state);
    const perDay = pricePerDayFor(car.pricePerDay, d);
    const total = perDay * (d||1) + sur;
    const activeTier = tierFor(d);
    const tiersRef = useRef(null);
    const activeIdx = PRICE_TIERS.findIndex(t=>t.minDays===activeTier.minDays);
    // Центрируем активный тир в карусели при первом отображении.
    useEffect(()=>{
      const cont = tiersRef.current;
      if (!cont || activeIdx < 0) return;
      // двойной rAF — ждём пока браузер посчитает реальные размеры детей
      const center = ()=>{
        const child = cont.children[activeIdx];
        if (!child) return;
        const target = child.offsetLeft - (cont.clientWidth - child.offsetWidth) / 2;
        cont.scrollLeft = Math.max(0, target);
      };
      requestAnimationFrame(()=>requestAnimationFrame(center));
    }, [activeIdx]);
    return h("div",null,
      h(GlassHeader,{title:"",transparent:true,onBack,right:h(CurrencyTogglePill,{cur,setCur})}),

  function ExtrasStep({state, extras, setExtras, onBack, onNext, cur, setCur, days:d}) {
    const groups = {}; EXTRAS.forEach(e=>{ (groups[e.group]||=[]).push(e); });
    const cnt = countExtras(extras);
    const total = calcExtrasEur(extras, d);
    const inc = (id)=>{ const ex = EXTRAS.find(e=>e.id===id); const cur = extras[id]||0; const next = Math.min(ex.max, cur+1); setExtras({...extras, [id]: next}); tap(8); };
    const dec = (id)=>{ const cur = extras[id]||0; const next = Math.max(0, cur-1); const e = {...extras}; if (next===0) delete e[id]; else e[id]=next; setExtras(e); tap(8); };
    const tog = (id)=>{ const cur = extras[id]||0; if (cur) dec(id); else inc(id); };
    return h("div",null,
      h(GlassHeader,{title:"Дополнительные услуги",onBack,right:h(CurrencyTogglePill,{cur,setCur})}),
      h(StepBar,{step:1,onJump:(s)=>s===0&&onBack()}),
      d>=8 && h("div",{style:{margin:"4px 16px 14px",padding:"10px 14px",background:T.primaryDim,color:T.primary,borderRadius:14,fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:8}},
        h(I.bolt), "При аренде от 8 дней — оплата только за 7"
      ),
      h("div",{style:{padding:"0 16px 24px"}},
        Object.entries(groups).map(([g,items])=>h("div",{key:g,style:{marginBottom:18}},
          h("div",{style:{fontSize:11,color:T.textMuted,fontWeight:600,letterSpacing:0.4,textTransform:"uppercase",marginBottom:8}}, g),
          h("div",{style:{display:"grid",gap:8}},
            items.map(ex=>{
              const count = extras[ex.id]||0;
              const sel = count>0;
              const itemTotal = (ex.perDay?ex.price*Math.max(d,1):ex.price)*count;
              // Тап по ряду:
              //  - max=1 → toggle
              //  - max>1: если 0 → +1; если уже выбрано → ничего (используй stepper кнопки)
              const onRowClick = () => {
                if (count === 0) inc(ex.id);
                else if (ex.max === 1) dec(ex.id);
              };
              return h(Pressable,{key:ex.id,onClick:onRowClick,style:{padding:"12px 14px",background:sel?T.primaryDim:T.surface,border:`1.5px solid ${sel?T.primary:"transparent"}`,borderRadius:14,display:"flex",alignItems:"center",gap:12,width:"100%"}},
                h("div",{style:{flex:1,minWidth:0}},
                  h("div",{style:{fontSize:14,fontWeight:600,color:T.text}}, ex.name),
                  h("div",{style:{fontSize:12,color:T.textMuted,marginTop:2}}, fmt(ex.price,cur)+(ex.perDay?"/день":""), sel && ex.perDay && " · итого "+fmt(itemTotal,cur))
                ),
                ex.max > 1
                  ? h("div",{style:{display:"flex",alignItems:"center",gap:0,background:sel?T.primary:T.bgElev,borderRadius:999,color:sel?T.primaryText:T.text,flexShrink:0}},
                      h(Pressable,{onClick:()=>dec(ex.id),disabled:!count,stopProp:true,style:{width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",opacity:count?1:0.4}}, h(I.minus)),
                      h("span",{style:{minWidth:20,textAlign:"center",fontWeight:700,fontSize:14}}, count),
                      h(Pressable,{onClick:()=>inc(ex.id),disabled:count>=ex.max,stopProp:true,style:{width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",opacity:count<ex.max?1:0.4}}, h(I.plus))
                    )
                  : h("span",{style:{width:30,height:30,borderRadius:8,border:`2px solid ${sel?T.primary:T.borderStrong}`,background:sel?T.primary:"transparent",color:T.primaryText,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}, sel && h(I.check))
              );
            })
          )

  function summarizeExtras(extras) {
    const items = Object.entries(extras||{}).filter(([,c])=>c>0).slice(0,2).map(([id,c])=>{
      const ex = EXTRAS.find(e=>e.id===id);
      return ex ? (c>1 ? ex.name+" ×"+c : ex.name) : "";

    if (all.length > 2) items.push("+"+(all.length-2));
    return items.join(", ");

  // ── Anim Counter — числа считают вверх с ease-out ──
  function Counter({to, decimals=0, suffix="", delay=0}) {
    const [val, setVal] = useState(0);
    useEffect(()=>{
      let raf, startT = performance.now() + delay;
      const tick = (now)=>{
        const p = Math.max(0, Math.min((now - startT) / 1400, 1));
        const eased = 1 - Math.pow(1 - p, 3);
        setVal(to * eased);
        if (p < 1) raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
      return ()=>cancelAnimationFrame(raf);
    },[to, delay]);
    return (decimals>0 ? val.toFixed(decimals) : Math.floor(val)) + suffix;
  }

  function Onboarding({onDone}) {
    const [step, setStep] = useState(0);
    const [lang, setLang] = useState("sr"); // дефолт — сербский (локальный)
    const [age, setAge] = useState(null);
    const [marketing, setMarketing] = useState(false);
    const total = 5; // Language + Welcome + Age + Geo + Notif
    const next = ()=>{ tap(10); if (step < total-1) setStep(step+1); };
    const back = ()=>{ tap(8); if (step > 0) setStep(step-1); };

    const finish = (locConsent, notifConsent)=>{
      const prefs = { lang, age, locConsent, notifConsent, marketing, completedAt:Date.now() };
      try { localStorage.setItem("rc-onboarded","1"); localStorage.setItem("rc-prefs", JSON.stringify(prefs)); } catch(e) {}
      tap(20);
      onDone(prefs);
    };

    const requestLocation = ()=>{
      if (navigator.geolocation) {
        try {
          navigator.geolocation.getCurrentPosition(
            ()=>nextWithLoc("granted"),
            ()=>nextWithLoc("denied"),
            { timeout: 5000 }
          );
        } catch(e) { nextWithLoc("error"); }
      } else { nextWithLoc("unsupported"); }
    };
    const [locConsent, setLocConsent] = useState(null);
    // Geo=step 3, после согласия → step 4 (Notif)
    const nextWithLoc = (val)=>{ setLocConsent(val); setStep(4); tap(10); };
    const skipLocation = ()=>{ setLocConsent("skipped"); setStep(4); tap(8); };

    const requestNotif = ()=>{
      if ("Notification" in window) {
        try {
          Notification.requestPermission().then(p=>finish(locConsent, p)).catch(()=>finish(locConsent,"error"));
        } catch(e) { finish(locConsent,"error"); }
      } else { finish(locConsent,"unsupported"); }
    };
    const skipNotif = ()=>{ finish(locConsent, "skipped"); };

    // Порядок: Language=0 → Welcome=1 → Age=2 → Geo=3 → Notif=4
    // ProgressDots — только на «конфигурационных» (Age/Geo/Notif).
    if (step === 0) return h(OnbLanguage, {lang,setLang,onNext:next});
    if (step === 1) return h(OnbWelcome, {onNext:next, lang});
    if (step === 2) return h(OnbAge, {age,setAge,step:0,total:3,onBack:back,onNext:next,lang});
    if (step === 3) return h(OnbLocation, {step:1,total:3,onBack:back,onAllow:requestLocation,onSkip:skipLocation,lang});
    if (step === 4) return h(OnbNotif, {step:2,total:3,onBack:()=>setStep(3),onAllow:requestNotif,onSkip:skipNotif,marketing,setMarketing,lang});
    return null;
  }

      view==="extras" && car && h(ExtrasStep,{state:s,extras,setExtras,onBack:()=>setView("insurance"),onNext:()=>{setView("summary"); tap(10);},cur,setCur,days:d}),
      view==="summary" && car && h(BookingSummary,{car,state:s,ins,extras,docs,setDocs,contact,setContact,terms,setTerms,onBack:()=>setView("extras"),onSubmit:submit,cur,setCur,jumpStep,days:d,onSheet:setSheet}),
      view==="success" && car && h(Success,{car,total,days:d,state:s,contact,cur,onDone:done}),

      h(DateSheet,{open:sheet==="date",onClose:()=>{setSheet(null); setAfterDateGo(null);},value:{start:s.pickupDate,end:s.returnDate},onConfirm:(v)=>{
        setS({...s,pickupDate:v.start,returnDate:v.end});
        setSheet(null);
        if (afterDateGo) { setView(afterDateGo); setAfterDateGo(null); tap(10); }
      }}),
      h(LocSheet,{open:sheet==="loc-pickup",onClose:()=>setSheet(null),valueLoc:s.pickupLoc,valueTime:s.pickupTime,onConfirm:(v)=>{setS({...s,pickupLoc:v.loc,pickupTime:v.time});setSheet(null);},title:"Где забрать?",timeLabel:"Время получения",cur,context:"pickup"}),
      h(LocSheet,{open:sheet==="loc-return",onClose:()=>setSheet(null),valueLoc:s.returnLoc,valueTime:s.returnTime,onConfirm:(v)=>{setS({...s,returnLoc:v.loc,returnTime:v.time});setSheet(null);},title:"Куда вернуть?",timeLabel:"Время возврата",cur,context:"return"}),
      h(SupportSheet,{open:sheet==="support",onClose:()=>setSheet(null)}),
      h(InfoSheet,{open:sheet==="info-privacy",onClose:()=>setSheet(null),title:"Обработка персональных данных",
        body:"Мы собираем e-mail, телефон, имя и фото документов исключительно для оформления договора аренды и связи с вами. Данные хранятся в защищённой базе на серверах в ЕС, не передаются третьим лицам кроме платёжного шлюза (Stripe) при проведении оплаты. Вы можете запросить удаление данных в любой момент: hello@rentcar.rs. Полная политика конфиденциальности — на сайте."}),
      h(InfoSheet,{open:sheet==="info-terms",onClose:()=>setSheet(null),title:"Условия аренды",
        body:"Договор аренды составляется индивидуально на основе выбранных параметров. Включает: ответственность сторон, депозит и условия его возврата, лимит пробега, правила возврата авто, штрафы за повреждения, страховое покрытие. Полный текст PDF придёт на e-mail сразу после бронирования. Подписать можно онлайн или при выдаче авто."}),
    );
  }

  const root = document.getElementById("app");
  root.innerHTML = "";
  ReactDOM.createRoot(root).render(h(App));
  } catch(err) {
    var f=document.getElementById('fb');
    if(f){f.style.display='block';f.textContent='Ошибка: '+(err && err.message || err);}
    console.error(err);
  }
}
if (document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot); else boot();
})();
</script>
</body>
</html>
