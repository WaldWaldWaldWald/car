  function ExtrasStep({state, extras, setExtras, onBack, onNext, cur, setCur, days:d}) {
    const groups = {}; EXTRAS.forEach(e=>{ (groups[e.group]||=[]).push(e); });
    const cnt = countExtras(extras);
    const total = calcExtrasEur(extras, d);
    const inc = (id)=>{ const ex = EXTRAS.find(e=>e.id===id); const cur = extras[id]||0; const next = Math.min(ex.max, cur+1); setExtras({...extras, [id]: next}); tap(8); };
    const dec = (id)=>{ const cur = extras[id]||0; const next = Math.max(0, cur-1); const e = {...extras}; if (next===0) delete e[id]; else e[id]=next; setExtras(e); tap(8); };
    const tog = (id)=>{ const cur = extras[id]||0; if (cur) dec(id); else inc(id); };
    return h("div",null,
      h(GlassHeader,{title:"Дополнительные услуги",onBack,right:h(CurrencyTogglePill,{cur,setCur})}),
      h(StepBar,{step:1,onJump:(s)=>s===0&&onBack()}),
      d>=8 && h("div",{style:{margin:"4px 16px 14px",padding:"10px 14px",background:T.primaryDim,color:T.primary,borderRadius:14,fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:8}},
        h(I.bolt), "При аренде от 8 дней — оплата только за 7"
      ),
      h("div",{style:{padding:"0 16px 24px"}},
        Object.entries(groups).map(([g,items])=>h("div",{key:g,style:{marginBottom:18}},
          h("div",{style:{fontSize:11,color:T.textMuted,fontWeight:600,letterSpacing:0.4,textTransform:"uppercase",marginBottom:8}}, g),
          h("div",{style:{display:"grid",gap:8}},
            items.map(ex=>{
              const count = extras[ex.id]||0;
              const sel = count>0;
              const itemTotal = (ex.perDay?ex.price*Math.max(d,1):ex.price)*count;
              // Тап по ряду:
              //  - max=1 → toggle
              //  - max>1: если 0 → +1; если уже выбрано → ничего (используй stepper кнопки)
              const onRowClick = () => {
                if (count === 0) inc(ex.id);
                else if (ex.max === 1) dec(ex.id);
              };
              return h(Pressable,{key:ex.id,onClick:onRowClick,style:{padding:"12px 14px",background:sel?T.primaryDim:T.surface,border:`1.5px solid ${sel?T.primary:"transparent"}`,borderRadius:14,display:"flex",alignItems:"center",gap:12,width:"100%"}},
                h("div",{style:{flex:1,minWidth:0}},
                  h("div",{style:{fontSize:14,fontWeight:600,color:T.text}}, ex.name),
                  h("div",{style:{fontSize:12,color:T.textMuted,marginTop:2}}, fmt(ex.price,cur)+(ex.perDay?"/день":""), sel && ex.perDay && " · итого "+fmt(itemTotal,cur))
                ),
                ex.max > 1
                  ? h("div",{style:{display:"flex",alignItems:"center",gap:0,background:sel?T.primary:T.bgElev,borderRadius:999,color:sel?T.primaryText:T.text,flexShrink:0}},
                      h(Pressable,{onClick:()=>dec(ex.id),disabled:!count,stopProp:true,style:{width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",opacity:count?1:0.4}}, h(I.minus)),
                      h("span",{style:{minWidth:20,textAlign:"center",fontWeight:700,fontSize:14}}, count),
                      h(Pressable,{onClick:()=>inc(ex.id),disabled:count>=ex.max,stopProp:true,style:{width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",opacity:count<ex.max?1:0.4}}, h(I.plus))
                    )
                  : h("span",{style:{width:30,height:30,borderRadius:8,border:`2px solid ${sel?T.primary:T.borderStrong}`,background:sel?T.primary:"transparent",color:T.primaryText,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}, sel && h(I.check))
              );
            })
          )
        ))

        h("div",{style:{flex:1,minWidth:0}},
          h("div",{style:{fontSize:11,color:T.textMuted,textTransform:"uppercase",letterSpacing:0.4}}, "По договору"),
          h("div",{style:{fontSize:22,fontWeight:800,color:T.primary}}, fmt(total,cur))
        ),
        h(PrimaryBtn,{onClick:onSubmit,disabled:!valid,full:false,style:{minWidth:160}}, "Забронировать")
      )
    );
  }

  function summarizeExtras(extras) {
    const items = Object.entries(extras||{}).filter(([,c])=>c>0).slice(0,2).map(([id,c])=>{
      const ex = EXTRAS.find(e=>e.id===id);
      return ex ? (c>1 ? ex.name+" ×"+c : ex.name) : "";
    });
    const all = Object.entries(extras||{}).filter(([,c])=>c>0);
    if (all.length > 2) items.push("+"+(all.length-2));
    return items.join(", ");
  }

  function SummaryLocLine({loc, time, label, cur}) {
    const ic = locIconStyle(loc);
    const display = locDisplay(loc, label === "Получение" ? "pickup" : "return");
    const pill = pricePillProps(loc, false, cur);
    return h("div",{style:{padding:"14px",display:"flex",alignItems:"center",gap:12}},
      h("span",{style:{width:36,height:36,borderRadius:12,background:ic.bg,color:ic.color,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,fontWeight:700}}, loc.code || h(loc.type==="airport"?I.plane:loc.type==="office"?I.home:I.truck)),
      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{fontSize:11,color:T.textMuted,fontWeight:600,letterSpacing:0.3,textTransform:"uppercase"}}, label),
        h("div",{style:{fontSize:14,fontWeight:600,marginTop:2,color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, display.name),
        h("div",{style:{fontSize:12,color:T.textMuted,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, display.subtitle+" · "+time)
      ),
      h("span",{style:{padding:"3px 8px",borderRadius:999,background:pill.bg,color:pill.color,fontSize:11,fontWeight:700,whiteSpace:"nowrap",minWidth:46,textAlign:"center",flexShrink:0}}, pill.text)
    );
  }

  function EditableRow({label,icon,title,sub,right,onEdit}) {
    return h(Pressable,{onClick:onEdit,style:{margin:"0 16px 12px",padding:"14px",background:T.bgElev,border:"1px solid "+T.border,borderRadius:18,width:"calc(100% - 32px)",display:"flex",alignItems:"center",gap:12}},
      h("span",{style:{width:38,height:38,borderRadius:12,background:T.primaryDim,color:T.primary,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}, icon),
      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{fontSize:11,color:T.textMuted,fontWeight:600,letterSpacing:0.3,textTransform:"uppercase"}}, label),
        h("div",{style:{fontSize:14,fontWeight:600,marginTop:2,color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, title),
        sub && h("div",{style:{fontSize:12,color:T.textMuted,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, sub)
      ),
      h("div",{style:{display:"flex",alignItems:"center",gap:8,flexShrink:0}},
        right,
        h("span",{style:{color:T.textSubtle}}, h(I.edit))
      )
    );
  }

  function DocCard({kind,icon,label,doc,onUpload,onClear}) {
    const inputRef = useRef(null);
    const [error, setError] = useState("");
    const handleFile = (file) => {
      setError("");
      if (!file) return;
      if (!/^image\//.test(file.type)) { setError("Только фото · JPEG / PNG / HEIC"); return; }
      if (file.size > MAX_FILE_BYTES) {
        const mb = (file.size / 1024 / 1024).toFixed(1);
        setError("Файл "+mb+" МБ — максимум 5 МБ");
        return;
      }
      onUpload(file);
    };
    const subtitle = error
      ? error
      : doc ? "Загружено · нажмите «Удалить» чтобы заменить" : "JPEG / PNG · до 5 МБ";
    return h("div",{style:{padding:"12px 14px",background:doc?T.successDim:(error?T.dangerDim:T.surface),border:`1.5px solid ${doc?T.success:(error?T.danger:"transparent")}`,borderRadius:14,display:"flex",alignItems:"center",gap:12,position:"relative",transition:"all 0.15s"}},
      h("input",{type:"file",accept:"image/*",ref:inputRef,style:{display:"none"},onChange:(e)=>handleFile(e.target.files[0])}),
      doc
        ? h("img",{src:doc,alt:"",style:{width:50,height:50,borderRadius:10,objectFit:"cover",flexShrink:0,border:"1px solid "+T.border}})
        : h("span",{style:{width:50,height:50,borderRadius:10,background:T.bgElev,color:error?T.danger:T.textMuted,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}, icon),
      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{fontSize:14,fontWeight:600,color:T.text}}, label),
        h("div",{style:{fontSize:12,color:doc?T.success:(error?T.danger:T.textMuted),marginTop:2,fontWeight:error?500:400}}, subtitle)
      ),
      doc
        ? h(Pressable,{onClick:()=>{onClear(); setError("");},style:{padding:"6px 10px",background:T.bgElev,color:T.text,borderRadius:8,fontSize:12,fontWeight:600,flexShrink:0}}, "Удалить")
        : h(Pressable,{onClick:()=>inputRef.current&&inputRef.current.click(),style:{padding:"6px 10px",background:T.primary,color:"#fff",borderRadius:8,fontSize:12,fontWeight:600,flexShrink:0}}, "Загрузить")
    );
  }

  function Field({label,value,onChange,placeholder,type,error,inputMode,autoComplete}) {
    const [focus,setFocus]=useState(false);
    const [touched,setTouched]=useState(false);
    const showErr = !focus && touched && error;
    return h("label",{style:{display:"block"}},
      h("div",{style:{fontSize:12,color:T.textMuted,marginBottom:6,fontWeight:500}}, label),
      h("input",{
        type:type||"text", value:value||"",
        inputMode, autoComplete,
        onChange:(e)=>onChange(e.target.value),
        onFocus:()=>setFocus(true),
        onBlur:()=>{setFocus(false); setTouched(true);},
        placeholder,
        style:{width:"100%",minHeight:48,padding:"0 14px",background:T.surface,
          border:`1.5px solid ${showErr?T.danger:(focus?T.primary:"transparent")}`,
          borderRadius:14,fontSize:16,color:T.text,outline:"none",fontFamily:"inherit",
          transition:"border-color 0.15s"}
      }),
      showErr && h("div",{style:{fontSize:11,color:T.danger,marginTop:4,fontWeight:500}}, error)
    );
  }

  function Line({l,v}) {
    return h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,padding:"6px 0"}},
      h("span",{style:{color:T.textMuted}}, l),
      h("span",{style:{fontWeight:600,color:T.text}}, v)
    );
  }

  function Success({car, total, days, state, contact, cur, onDone}) {
    const bookingNo = useMemo(()=>"VR-"+Math.floor(Math.random()*900000+100000),[]);
    const email = contact.email || "your@email.com";
    return h("div",null,
      h(GlassHeader,{title:"",transparent:true}),
      h("div",{style:{padding:"12px 16px 18px",textAlign:"center"}},
        h("div",{style:{width:96,height:96,borderRadius:"50%",background:T.successDim,color:T.success,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}},
          h("svg",{width:44,height:44,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:3,strokeLinecap:"round",strokeLinejoin:"round"}, h("path",{d:"M5 12l4 4 10-10"}))
        ),
        h("h1",{style:{fontSize:24,fontWeight:800,margin:"0 0 6px",color:T.text}}, "Бронь оформлена"),
        h("div",{style:{fontSize:14,color:T.textMuted,lineHeight:1.5}},
          car.model+" · "+days+" дн.",h("br"),
          "№ ",h("b",{style:{color:T.text}}, bookingNo)
        )
      ),

      h("div",{style:{margin:"0 16px 12px",padding:14,background:T.infoDim,borderRadius:18,display:"flex",alignItems:"flex-start",gap:12}},
        h("span",{style:{width:36,height:36,borderRadius:12,background:T.info,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}, h(I.mail)),
        h("div",{style:{textAlign:"left",flex:1}},
          h("div",{style:{fontSize:14,fontWeight:700,color:T.info}}, "Договор отправлен на почту"),
          h("div",{style:{fontSize:13,color:T.text,marginTop:4,lineHeight:1.4}}, "Предварительный договор и инструкция по оплате — на ", h("b",null,email), ".")
        )
      ),

      h("div",{style:{margin:"0 16px 12px",padding:"14px",background:T.bgElev,border:"1px solid "+T.border,borderRadius:18}},
        h("div",{style:{fontSize:13,fontWeight:700,marginBottom:10,color:T.text}}, "Что дальше"),
        [
          ["1","Откройте письмо и ознакомьтесь с договором"],
          ["2","Оплатите по ссылке — без комиссий приложения"],
          ["3","Заберите авто " + fmtDayShort(state.pickupDate) + " в " + state.pickupTime + " — за 5 минут"],
        ].map(([n,txt],i)=>h("div",{key:i,style:{display:"flex",alignItems:"flex-start",gap:10,padding:"6px 0"}},
          h("span",{style:{width:22,height:22,borderRadius:"50%",background:T.primaryDim,color:T.primary,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,fontWeight:700}}, n),
          h("div",{style:{fontSize:13,lineHeight:1.4,color:T.text}}, txt)
        ))
      ),

      h("div",{style:{margin:"0 16px 14px",padding:14,background:T.surface,borderRadius:18}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline"}},
          h("span",{style:{fontSize:13,color:T.textMuted}}, "Сумма по договору"),
          h("span",{style:{fontSize:22,fontWeight:800,color:T.primary}}, fmt(total,cur))
        ),
        h("div",{style:{fontSize:11,color:T.textMuted,marginTop:6}}, "Оплата вне приложения, без комиссий")
      ),

      h("div",{style:{padding:"0 16px 24px",paddingBottom:sbPlus(24)}},
        h(PrimaryBtn,{onClick:onDone}, "На главную")
      )
    );
  }

  function App() {
    const [view, setView] = useState("home");
    const [sheet, setSheet] = useState(null);
    const [car, setCar] = useState(null);
    const [cur, setCur] = useState("EUR");
    const [ins, setIns] = useState("reduced");
    const [extras, setExtras] = useState({});
    const [docs, setDocs] = useState({passport:null,license:null});
    const [contact, setContact] = useState({kind:"person",firstName:"",lastName:"",email:"",phone:"",companyPib:""});
    const [terms, setTerms] = useState(false);
    const [s, setS] = useState({
      pickupLoc:"airport-bg", pickupDate:todayPlus(2), pickupTime:"10:00",
      returnLoc:"airport-bg", returnDate:todayPlus(5), returnTime:"10:00",
    });

    const insOpt = INSURANCES.find(i=>i.id===ins);
    const d = days(s.pickupDate,s.returnDate);
    const total = useMemo(()=>{
      if(!car) return 0;
      const sur = calcSurchargesEur(s);
      return car.pricePerDay*d + insOpt.pricePerDay*d + calcExtrasEur(extras,d) + sur + SERVICE_FEE_EUR;
    },[car,s,insOpt,extras,d]);

    const submit = ()=>{ tap(20); setView("success"); window.scrollTo&&window.scrollTo(0,0); };
    const done = ()=>{
      setView("home"); setCar(null); setIns("reduced"); setExtras({});
      setDocs({passport:null,license:null}); setContact({kind:"person",firstName:"",lastName:"",email:"",phone:"",companyPib:""}); setTerms(false); tap(8);
    };
    const jumpStep = (st)=>{ if(st===0) setView("insurance"); else if(st===1) setView("extras"); else if(st===2) setView("summary"); };

    // Auto scroll to top on view change
    const scroller = document.getElementById("app");
    useEffect(()=>{ if(scroller) scroller.scrollTop = 0; },[view]);

    return h("div",{style:{minHeight:"100%",background:T.bg,color:T.text,fontFamily:"inherit",position:"relative"}},
      view==="home" && h(Home,{state:s,onSheet:setSheet,onSearch:()=>{setView("catalog"); tap(10);},cur,setCur}),
      view==="catalog" && h(Catalog,{state:s,onBack:()=>setView("home"),onSelect:(c)=>{setCar(c); setView("detail"); tap(8);},onEdit:()=>setView("home"),cur,setCur}),
      view==="detail" && car && h(CarDetail,{car,state:s,onBack:()=>setView("catalog"),onConfirm:()=>{setView("insurance"); tap(10);},cur,setCur}),
      view==="insurance" && car && h(InsuranceStep,{state:s,ins,setIns,onBack:()=>setView("detail"),onNext:()=>{setView("extras"); tap(10);},cur,setCur,days:d}),
      view==="extras" && car && h(ExtrasStep,{state:s,extras,setExtras,onBack:()=>setView("insurance"),onNext:()=>{setView("summary"); tap(10);},cur,setCur,days:d}),
      view==="summary" && car && h(BookingSummary,{car,state:s,ins,extras,docs,setDocs,contact,setContact,terms,setTerms,onBack:()=>setView("extras"),onSubmit:submit,cur,setCur,jumpStep,days:d,onSheet:setSheet}),
      view==="success" && car && h(Success,{car,total,days:d,state:s,contact,cur,onDone:done}),

      h(DateSheet,{open:sheet==="date",onClose:()=>setSheet(null),value:{start:s.pickupDate,end:s.returnDate},onConfirm:(v)=>{setS({...s,pickupDate:v.start,returnDate:v.end});setSheet(null);}}),
      h(LocSheet,{open:sheet==="loc-pickup",onClose:()=>setSheet(null),valueLoc:s.pickupLoc,valueTime:s.pickupTime,onConfirm:(v)=>{setS({...s,pickupLoc:v.loc,pickupTime:v.time});setSheet(null);},title:"Где забрать?",timeLabel:"Время получения",cur,context:"pickup"}),
      h(LocSheet,{open:sheet==="loc-return",onClose:()=>setSheet(null),valueLoc:s.returnLoc,valueTime:s.returnTime,onConfirm:(v)=>{setS({...s,returnLoc:v.loc,returnTime:v.time});setSheet(null);},title:"Куда вернуть?",timeLabel:"Время возврата",cur,context:"return"}),
      h(SupportSheet,{open:sheet==="support",onClose:()=>setSheet(null)}),
      h(InfoSheet,{open:sheet==="info-privacy",onClose:()=>setSheet(null),title:"Обработка персональных данных",
        body:"Мы собираем e-mail, телефон, имя и фото документов исключительно для оформления договора аренды и связи с вами. Данные хранятся в защищённой базе на серверах в ЕС, не передаются третьим лицам кроме платёжного шлюза (Stripe) при проведении оплаты. Вы можете запросить удаление данных в любой момент: hello@rentcar.rs. Полная политика конфиденциальности — на сайте."}),
      h(InfoSheet,{open:sheet==="info-terms",onClose:()=>setSheet(null),title:"Условия аренды",
        body:"Договор аренды составляется индивидуально на основе выбранных параметров. Включает: ответственность сторон, депозит и условия его возврата, лимит пробега, правила возврата авто, штрафы за повреждения, страховое покрытие. Полный текст PDF придёт на e-mail сразу после бронирования. Подписать можно онлайн или при выдаче авто."}),
    );
  }

  const root = document.getElementById("app");
  root.innerHTML = "";
  ReactDOM.createRoot(root).render(h(App));
  } catch(err) {
    var f=document.getElementById('fb');
    if(f){f.style.display='block';f.textContent='Ошибка: '+(err && err.message || err);}
    console.error(err);
  }
}
if (document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot); else boot();
})();
</script>
</body>
</html>
